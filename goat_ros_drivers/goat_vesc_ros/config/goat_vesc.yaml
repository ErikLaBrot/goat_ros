goat_vesc_ros:
  ros__parameters:
    # Replace this with the stable by-id path for the vehicle's VESC.
    device_path: "/dev/ttyACM0"
    baud: 115200
    auto_connect: true
    auto_reconnect: true
    reconnect_period_ms: 1000

    imu_poll_interval_ms: 10
    motor_poll_interval_ms: 50
    poll_response_timeout_ms: 20
    query_guard_window_ms: 5

    # These watchdog settings are forwarded to goat_vesc for drive-side safety only.
    command_watchdog_timeout_ms: 250
    command_watchdog_action: "coast"
    max_brake_current: 0.0
    command_watchdog_brake_current: 0.0

    publish_imu: true
    publish_motor_state: true
    frame_id: "base_link"
    imu_frame_id: ""
    # Zero covariance means the IMU is available but not yet characterized.
    imu_angular_velocity_covariance_diagonal: [0.0, 0.0, 0.0]
    imu_linear_acceleration_covariance_diagonal: [0.0, 0.0, 0.0]

    # Canonical actuator command topic using goat_vesc_ros/msg/VescControlCommand.
    command_topic: "cmd/vesc"
